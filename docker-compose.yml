services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/caddy/www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    depends_on:
      - app
    container_name: peercast-0yp-caddy

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PCP_PORT}:7144"
    env_file: .env
    environment:
      TZ: Asia/Tokyo
      DB_HOST: mariadb
    volumes:
      - ./peercast-0yp.toml:/app/peercast-0yp.toml:ro
    depends_on:
      mariadb:
        condition: service_healthy
    container_name: peercast-0yp

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Tokyo
    command: --default-time-zone=+09:00
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/db/init_user.sh:/docker-entrypoint-initdb.d/init_user.sh:ro
      - ./docker/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: peercast-0yp-mariadb

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:
