services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/caddy/www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    depends_on:
      - app
    container_name: peercast-0yp-caddy

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PCP_PORT}:7144"
    env_file: .env
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ./peercast-0yp.toml:/app/peercast-0yp.toml:ro
    container_name: peercast-0yp

volumes:
  caddy_data:
  caddy_config:
