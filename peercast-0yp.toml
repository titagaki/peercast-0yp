[pcp]
port = 7144
max_connections = 100
update_interval = 120  # seconds
hit_timeout = 150      # seconds
min_client_version = 1200

[http]
port = 80
yp_name      = "0yp"
yp_url       = "http://yayaue.me/yp/"
yp_index_url = "http://yayaue.me/yp/index.txt"  # shown in howto page
pcp_address  = "pcp://yayaue.me/"               # shown in howto page

# Allowed origins for CORS. Set to the Vite dev server origin when developing locally.
# In production, leave empty [] — the frontend is served from the same origin and CORS is not needed.
cors_origins = []

# Announcement lines shown above the status line in index.txt (optional, multiple allowed).
[[http.info]]
name    = "0yp ※お知らせ 2026/3/8"
comment = "0ypは現在試験運用中です。"
url     = ""

# [[http.info]]
# name    = "0yp ※配信ルール"
# comment = "違法コンテンツの配信は禁止です。"
# url     = "https://example.com/rules"

# Database credentials are read from environment variables. See .env.example
