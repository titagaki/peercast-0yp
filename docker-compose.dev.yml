services:
  app:
    environment:
      DB_HOST: mariadb
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Tokyo
    command: --default-time-zone=+09:00
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/db/init_user.sh:/docker-entrypoint-initdb.d/init_user.sh:ro
      - ./docker/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: peercast-0yp-mariadb

volumes:
  mariadb_data:
